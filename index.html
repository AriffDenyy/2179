<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Tourism Visualizations</title>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Sports & Fitness in Malaysia - Where People Work Out and How</h1>
    
    <div id="chart1" class="visualization"></div>
    <div id="chart2" class="visualization"></div>
    <div id="chart3" class="visualization"></div>
    <div id="chart4" class="visualization"></div>
    <div id="chart5" class="visualization"></div>
    <div id="chart6" class="visualization"></div>
    <div id="chart7" class="visualization"></div>
    <div id="chart8" class="visualization"></div>
    <div id="chart9" class="visualization"></div>
    <div id="chart10" class="visualization"></div>

    <script type="text/javascript">
        vegaEmbed('#chart1', 'chart1_venue_bubble_map.json');
        vegaEmbed('#chart2', 'chart2_venues_choropleth.json');
        vegaEmbed('#chart3', 'chart3_treemap.json');
        vegaEmbed('#chart4', 'chart4_ratings_by_category.json');
        vegaEmbed('#chart5', 'chart6_radar.json');
        vegaEmbed('#chart6', 'chart7_waffle.json');
        vegaEmbed('#chart7', 'chart8_bmi_vs_calories.json');
        vegaEmbed('#chart8', 'chart9_freq_vs_experience.json');
        vegaEmbed('#chart9', 'chart11_age_by_workout.json');
        vegaEmbed('#chart10', 'chart12_bmi_donut.json');
    </script>
</body>
</html>
