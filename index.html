<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysia Tourism Visualizations</title>
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
    <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">
    
</head>
<body>
    <h1>Malaysia Tourism Analysis</h1>
    
    <div id="vis1" class="visualization"></div>
    <div id="vis2" class="visualization"></div>
    <div id="vis3" class="visualization"></div>
    <div id="vis4" class="visualization"></div>
    <div id="vis5" class="visualization"></div>

    <script type="text/javascript">
        vegaEmbed('#vis1', 'vis1.vg.json', {actions: true});
        vegaEmbed('#vis2', 'vis2.vg.json', {actions: true});
        vegaEmbed('#vis3', 'vis3.vg.json', {actions: true});
        vegaEmbed('#vis4', 'vis4.vg.json', {actions: true});
        vegaEmbed('#vis5', 'vis5.vg.json', {actions: true});
    </script>
</body>
</html>
